name: "iotmer"
version: "0.1.13"
description: "IOTMER IoT Platform SDK for ESP-IDF"
license: "MIT"
url: "https://github.com/iotmertech/iotmer-sdk-esp-idf"
maintainers:
  - "IOTMER Tech <support@iotmer.com>"
tags:
  - "iot"
  - "mqtt"
  - "provisioning"
  - "ota"
  - "ble"
targets:
  - "esp32"
  - "esp32s2"
  - "esp32s3"
  - "esp32c3"
  - "esp32c6"
files:
  include:
    - "CMakeLists.txt"
    - "Kconfig.projbuild"
    - "README.md"
    - "LICENSE"
    - "examples/**"
    - "*.c"
    - "*.h"
    - "include/**"
dependencies:
  idf: ">=5.0.0"
  # ESP-IDF v6+: built-in `json` removed — use managed cJSON.
  espressif/cjson: "^1.7.19"
  # ESP-IDF v6+: ESP-MQTT moved out of core — use managed MQTT client.
  espressif/mqtt: "*"
  # Config protocol v1: gzip inflate (RFC1952) for `gzip+base64` responses.
  espressif/zlib: "1.3.2"

