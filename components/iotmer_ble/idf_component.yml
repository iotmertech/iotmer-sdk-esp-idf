name: "iotmer_ble"
version: "0.1.0"
description: "IOTMER BLE JSON channel (NimBLE GATT transport) for ESP-IDF"
license: "MIT"
url: "https://github.com/iotmertech/iotmer-sdk-esp-idf"
maintainers:
  - "IOTMER Tech <support@iotmer.com>"
tags:
  - "iot"
  - "ble"
  - "nimble"
  - "provisioning"
targets:
  - "esp32"
  - "esp32s3"
  - "esp32c3"
  - "esp32c6"
files:
  include:
    - "CMakeLists.txt"
    - "Kconfig.projbuild"
    - "README.md"
    - "*.c"
    - "include/**"
dependencies:
  idf: ">=5.0.0"

