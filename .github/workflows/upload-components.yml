name: Upload ESP-IDF components

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths:
      - "components/iotmer/**"
      - "components/iotmer_ble/**"
      - ".github/workflows/upload-components.yml"

jobs:
  validate_upload_dry_run:
    name: Validate upload (dry-run)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate component packaging (no publish)
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          dry_run: true

  upload_components:
    name: Upload components (publish)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set component version from tag
        shell: bash
        run: |
          set -euo pipefail
          export VERSION="${GITHUB_REF_NAME#v}"
          python3 - <<'PY'
          import os, re, sys

          version = os.environ["VERSION"]
          paths = [
              "components/iotmer/idf_component.yml",
              "components/iotmer_ble/idf_component.yml",
          ]

          for p in paths:
              with open(p, "r", encoding="utf-8") as f:
                  s = f.read()
              s2, n = re.subn(r'(?m)^version:\s*".*?"\s*$', f'version: "{version}"', s, count=1)
              if n != 1:
                  s2, n = re.subn(r'(?m)^version:\s*.*\s*$', f'version: "{version}"', s, count=1)
              if n != 1:
                  raise SystemExit(f"Failed to update version in {p}")
              with open(p, "w", encoding="utf-8") as f:
                  f.write(s2)
          PY

      - name: Upload components to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          version: ${{ github.ref_name }}
