name: Upload ESP-IDF components

on:
  push:
    branches: [ main ]
    tags:
      - "iotmer-v*"
      - "iotmer_ble-v*"
    paths:
      - "components/iotmer/**"
      - "components/iotmer_ble/**"
      - ".github/workflows/upload-components.yml"

jobs:
  # Ayrı job: biri 403/izin hatası verse diğeri yeşil kalır; registry'de her bileşen ayrı kayıt/izin ister.
  validate_iotmer:
    name: Validate iotmer (dry-run)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate iotmer (no publish)
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          dry_run: true

  validate_iotmer_ble:
    name: Validate iotmer_ble (dry-run)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate iotmer_ble (no publish)
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          dry_run: true

  upload_iotmer:
    name: Publish iotmer
    if: startsWith(github.ref, 'refs/tags/iotmer-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Version from tag
        id: meta
        run: |
          t="${GITHUB_REF_NAME}"
          case "$t" in
            iotmer-v*) echo "ver=${t#iotmer-v}" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected tag: $t"; exit 1 ;;
          esac

      - name: Upload iotmer to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          version: ${{ steps.meta.outputs.ver }}

  upload_iotmer_ble:
    name: Publish iotmer_ble
    if: startsWith(github.ref, 'refs/tags/iotmer_ble-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Version from tag
        id: meta
        run: |
          t="${GITHUB_REF_NAME}"
          case "$t" in
            iotmer_ble-v*) echo "ver=${t#iotmer_ble-v}" >> "$GITHUB_OUTPUT" ;;
            *) echo "Unexpected tag: $t"; exit 1 ;;
          esac

      - name: Upload iotmer_ble to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          version: ${{ steps.meta.outputs.ver }}
