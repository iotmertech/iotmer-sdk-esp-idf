name: Upload ESP-IDF components

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
    paths:
      - "components/iotmer/**"
      - "components/iotmer_ble/**"
      - ".github/workflows/upload-components.yml"

jobs:
  validate_upload_dry_run:
    name: Validate upload (dry-run)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Validate component packaging (no publish)
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          dry_run: true

  upload_components:
    name: Upload components (publish)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Upload components to ESP Component Registry
        uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "iotmertech"
          components: |
            iotmer: components/iotmer
            iotmer_ble: components/iotmer_ble
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
          version: ${{ github.ref_name }}
